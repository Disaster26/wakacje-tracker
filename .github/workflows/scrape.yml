name: Zbieranie cen wycieczek

on:
  schedule:
    # 2x dziennie, czas w UTC. Lato w PL = UTC+2.
    # 05:07 UTC = ~07:00 PL  -> rano, po nocnej aktualizacji cen przez touroperatorow
    # 19:07 UTC = ~21:00 PL  -> wieczorem, gdy najczesciej pojawiaja sie oferty last-minute
    # (minuty != 0, bo o pelnej godzinie GitHub Actions czesto opoznia harmonogram)
    - cron: '7 5 * * *'
    - cron: '7 19 * * *'
  workflow_dispatch:   # pozwala odpalic recznie z zakladki Actions

permissions:
  contents: write       # potrzebne, by commitowac zebrane dane

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalacja zaleznosci
        run: pip install -r scraper/requirements.txt

      - name: Pobierz ceny
        run: python scraper/scrape.py

      - name: Commit danych
        run: |
          git config user.name  "wakacje-bot"
          git config user.email "actions@github.com"
          git add data docs/data
          if git diff --staged --quiet; then
            echo "Brak zmian."
          else
            git commit -m "Ceny: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
